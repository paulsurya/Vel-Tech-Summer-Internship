<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <nav>
        <div class="logo">Vel<span>Tech</span> University</div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/register" class="active">Register</a></li>
            <li><a href="/students">Students</a></li>
            <li><a href="/about">About</a></li>
        </ul>
    </nav>

    <div class="section">
        <h2 class="section-title">Student Registration</h2>
        <p class="section-subtitle">Fill in the details below to register a new student</p>

<div class="form-container">
    <form action="/register" method="POST">

        <div class="form-group">
            <label>Student Name</label>
            <input type="text" name="name" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
            <label>Roll Number</label>
            <input type="text" name="roll" placeholder="Enter roll number" required>
        </div>

        <div class="form-group">
            <label>Department</label>
            <select name="department" required>
                <option value="">Select Department</option>
                <option value="CSE">CSE</option>
                <option value="IT">IT</option>
                <option value="ECE">ECE</option>
                <option value="EEE">EEE</option>
                <option value="MECH">MECH</option>
            </select>
        </div>

        <div class="form-group">
            <label>Year</label>
            <select name="year" required>
                <option value="">Select Year</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter email address" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="Enter phone number" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob" required>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address" placeholder="Enter full address" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Register Student</button>
        <a href="/" class="btn btn-outline" style="color:#1B2A4A; border-color:#1B2A4A;">Cancel</a>

    </form>
</div>

    <footer>
        <p>© 2025 <span>Vel Tech University</span> · Student Registration System · All Rights Reserved</p>
    </footer>

</body>

</html>
